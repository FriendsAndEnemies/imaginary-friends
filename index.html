<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decks — Friends &amp; Enemies</title>
<style>
  @font-face{font-family:"Outfit";src:url("assets/fonts/Outfit-VariableFont_wght.ttf") format("truetype-variations");font-weight:100 900;font-display:swap}
  @font-face{font-family:"EB Garamond";src:url("assets/fonts/EBGaramond-Italic-VariableFont_wght.ttf") format("truetype-variations");font-weight:400 800;font-style:italic;font-display:swap}
  @font-face{font-family:"Source Code Pro";src:url("assets/fonts/SourceCodePro-VariableFont_wght.ttf") format("truetype-variations");font-weight:200 900;font-display:swap}

  :root{
    --ink:#111111; --paper:#ffffff; --paper-warm:#faf9f7;
    --g200:#e6e5e3; --g300:#d4d4d4; --g400:#b0b0b0; --g500:#8a8a8a; --g600:#666666;
    --font-sans:"Outfit","Helvetica Neue",Arial,sans-serif;
    --font-serif:"EB Garamond",Georgia,serif;
    --font-mono:"Source Code Pro",ui-monospace,Menlo,monospace;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper-warm); color:var(--ink);
    font-family:var(--font-sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--ink);color:var(--paper)}

  .wrap{max-width:840px;margin:0 auto;padding:120px 32px 80px}

  .kick{display:flex;align-items:center;gap:14px;
    font-family:var(--font-mono);font-size:13px;font-weight:500;
    letter-spacing:.14em;text-transform:uppercase;margin-bottom:32px;color:var(--g600)}
  .kick .rule{flex:1;height:1px;background:var(--g300);max-width:200px}

  h1{
    font-family:var(--font-serif);font-style:italic;font-weight:500;
    font-size:56px;line-height:1.06;letter-spacing:-.01em;
    margin:0 0 12px;
  }
  .sub{font-weight:300;color:var(--g600);font-size:19px;margin:0 0 56px;max-width:56ch}

  .list{display:flex;flex-direction:column;border-top:1.5px solid var(--ink)}
  .deck{
    display:flex;align-items:baseline;justify-content:space-between;gap:24px;
    padding:26px 2px;border-bottom:1px solid var(--g200);
    text-decoration:none;color:var(--ink);
    transition:opacity .15s ease;
  }
  .deck:hover{opacity:.55}
  .deck .name{font-family:var(--font-sans);font-weight:500;font-size:23px;letter-spacing:-.01em}
  .deck .arrow{font-family:var(--font-mono);font-size:14px;color:var(--g500)}

  footer{margin-top:64px;font-family:var(--font-mono);font-size:12px;color:var(--g500);
    letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="wrap">
    <div class="kick"><span>Friends &amp; Enemies</span><span class="rule"></span><span>Decks</span></div>
    <h1>Presentations</h1>
    <p class="sub">A running set of decks — open any one below.</p>

    <nav class="list">
      <a class="deck" href="decks/frame-of-reference.html"><span class="name">Frame of Reference</span><span class="arrow">↗</span></a>
      <a class="deck" href="decks/onboarding.html"><span class="name">Onboarding</span><span class="arrow">↗</span></a>
      <a class="deck" href="decks/creative-101.html"><span class="name">Creative 101</span><span class="arrow">↗</span></a>
      <a class="deck" href="decks/discovery-business-landscape.html"><span class="name">Discovery — Business Landscape</span><span class="arrow">↗</span></a>
      <a class="deck" href="decks/discovery-marketing-objectives.html"><span class="name">Discovery — Marketing Objectives</span><span class="arrow">↗</span></a>
    </nav>

    <footer>Friends &amp; Enemies</footer>
  </div>
</body>
</html>
